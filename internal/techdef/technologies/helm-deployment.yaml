name: "Helm Deployment"
variant_group: "Helm"
standalone: false

prompts:
  - key: "chart_name"
    title: "Helm chart name:"
    type: "text"
    default_from: "project_name"
    mode: "composable"

structure:
  - path: "deploy/helm/{{.chart_name}}/"
  - path: "deploy/helm/{{.chart_name}}/Chart.yaml"
    content: |
      apiVersion: v2
      name: {{.chart_name}}
      description: A Helm chart for Kubernetes
      type: application
      version: 0.1.0
      appVersion: "0.1.0"
  - path: "deploy/helm/{{.chart_name}}/values.yaml"
    content: |
      replicaCount: 1

      image:
        repository: nginx
        pullPolicy: IfNotPresent
        tag: ""

      imagePullSecrets: []
      nameOverride: ""
      fullnameOverride: ""

      serviceAccount:
        create: true
        automount: true
        annotations: {}
        name: ""

      podAnnotations: {}
      podLabels: {}

      podSecurityContext: {}

      securityContext: {}

      service:
        type: ClusterIP
        port: 80

      ingress:
        enabled: false
        className: ""
        annotations: {}
        hosts:
          - host: chart-example.local
            paths:
              - path: /
                pathType: ImplementationSpecific
        tls: []

      resources: {}

      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 100
        targetCPUUtilizationPercentage: 80

      nodeSelector: {}
      tolerations: []
      affinity: {}
  - path: "deploy/helm/{{.chart_name}}/.helmignore"
    content: |
      .DS_Store
      .git/
      .github/
      .gitignore
      .devcontainer/
      .editorconfig
      .gitattributes
      *.md
      LICENSE
      Makefile
      tests/
  - path: "deploy/helm/{{.chart_name}}/templates/"
  - path: "deploy/helm/{{.chart_name}}/templates/deployment.yaml"
    content: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{"{{"}} include "{{.chart_name}}.fullname" . {{"}}"}}
        labels:
          {{"{{"}}- include "{{.chart_name}}.labels" . | nindent 4 {{"}}"}}
      spec:
        {{"{{"}}- if not .Values.autoscaling.enabled {{"}}"}}
        replicas: {{"{{"}} .Values.replicaCount {{"}}"}}
        {{"{{"}}- end {{"}}"}}
        selector:
          matchLabels:
            {{"{{"}}- include "{{.chart_name}}.selectorLabels" . | nindent 6 {{"}}"}}
        template:
          metadata:
            {{"{{"}}- with .Values.podAnnotations {{"}}"}}
            annotations:
              {{"{{"}}- toYaml . | nindent 8 {{"}}"}}
            {{"{{"}}- end {{"}}"}}
            labels:
              {{"{{"}}- include "{{.chart_name}}.labels" . | nindent 8 {{"}}"}}
              {{"{{"}}- with .Values.podLabels {{"}}"}}
              {{"{{"}}- toYaml . | nindent 8 {{"}}"}}
              {{"{{"}}- end {{"}}"}}
          spec:
            {{"{{"}}- with .Values.imagePullSecrets {{"}}"}}
            imagePullSecrets:
              {{"{{"}}- toYaml . | nindent 8 {{"}}"}}
            {{"{{"}}- end {{"}}"}}
            serviceAccountName: {{"{{"}} include "{{.chart_name}}.serviceAccountName" . {{"}}"}}
            securityContext:
              {{"{{"}}- toYaml .Values.podSecurityContext | nindent 8 {{"}}"}}
            containers:
              - name: {{"{{"}} .Chart.Name {{"}}"}}
                securityContext:
                  {{"{{"}}- toYaml .Values.securityContext | nindent 16 {{"}}"}}
                image: "{{"{{"}} .Values.image.repository {{"}}"}}:{{"{{"}} .Values.image.tag | default .Chart.AppVersion {{"}}"}}"
                imagePullPolicy: {{"{{"}} .Values.image.pullPolicy {{"}}"}}
                ports:
                  - name: http
                    containerPort: {{"{{"}} .Values.service.port {{"}}"}}
                    protocol: TCP
                livenessProbe:
                  httpGet:
                    path: /
                    port: http
                readinessProbe:
                  httpGet:
                    path: /
                    port: http
                resources:
                  {{"{{"}}- toYaml .Values.resources | nindent 16 {{"}}"}}
            {{"{{"}}- with .Values.nodeSelector {{"}}"}}
            nodeSelector:
              {{"{{"}}- toYaml . | nindent 8 {{"}}"}}
            {{"{{"}}- end {{"}}"}}
            {{"{{"}}- with .Values.affinity {{"}}"}}
            affinity:
              {{"{{"}}- toYaml . | nindent 8 {{"}}"}}
            {{"{{"}}- end {{"}}"}}
            {{"{{"}}- with .Values.tolerations {{"}}"}}
            tolerations:
              {{"{{"}}- toYaml . | nindent 8 {{"}}"}}
            {{"{{"}}- end {{"}}"}}
  - path: "deploy/helm/{{.chart_name}}/templates/service.yaml"
    content: |
      apiVersion: v1
      kind: Service
      metadata:
        name: {{"{{"}} include "{{.chart_name}}.fullname" . {{"}}"}}
        labels:
          {{"{{"}}- include "{{.chart_name}}.labels" . | nindent 4 {{"}}"}}
      spec:
        type: {{"{{"}} .Values.service.type {{"}}"}}
        ports:
          - port: {{"{{"}} .Values.service.port {{"}}"}}
            targetPort: http
            protocol: TCP
            name: http
        selector:
          {{"{{"}}- include "{{.chart_name}}.selectorLabels" . | nindent 4 {{"}}"}}
  - path: "deploy/helm/{{.chart_name}}/templates/serviceaccount.yaml"
    content: |
      {{"{{"}}- if .Values.serviceAccount.create -{{"}}"}}
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: {{"{{"}} include "{{.chart_name}}.serviceAccountName" . {{"}}"}}
        labels:
          {{"{{"}}- include "{{.chart_name}}.labels" . | nindent 4 {{"}}"}}
        {{"{{"}}- with .Values.serviceAccount.annotations {{"}}"}}
        annotations:
          {{"{{"}}- toYaml . | nindent 4 {{"}}"}}
        {{"{{"}}- end {{"}}"}}
      automountServiceAccountToken: {{"{{"}} .Values.serviceAccount.automount {{"}}"}}
      {{"{{"}}- end {{"}}"}}
  - path: "deploy/helm/{{.chart_name}}/templates/hpa.yaml"
    content: |
      {{"{{"}}- if .Values.autoscaling.enabled {{"}}"}}
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: {{"{{"}} include "{{.chart_name}}.fullname" . {{"}}"}}
        labels:
          {{"{{"}}- include "{{.chart_name}}.labels" . | nindent 4 {{"}}"}}
      spec:
        scaleTargetRef:
          apiVersion: apps/v1
          kind: Deployment
          name: {{"{{"}} include "{{.chart_name}}.fullname" . {{"}}"}}
        minReplicas: {{"{{"}} .Values.autoscaling.minReplicas {{"}}"}}
        maxReplicas: {{"{{"}} .Values.autoscaling.maxReplicas {{"}}"}}
        metrics:
          {{"{{"}}- if .Values.autoscaling.targetCPUUtilizationPercentage {{"}}"}}
          - type: Resource
            resource:
              name: cpu
              target:
                type: Utilization
                averageUtilization: {{"{{"}} .Values.autoscaling.targetCPUUtilizationPercentage {{"}}"}}
          {{"{{"}}- end {{"}}"}}
          {{"{{"}}- if .Values.autoscaling.targetMemoryUtilizationPercentage {{"}}"}}
          - type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: {{"{{"}} .Values.autoscaling.targetMemoryUtilizationPercentage {{"}}"}}
          {{"{{"}}- end {{"}}"}}
      {{"{{"}}- end {{"}}"}}
  - path: "deploy/helm/{{.chart_name}}/templates/ingress.yaml"
    content: |
      {{"{{"}}- if .Values.ingress.enabled -{{"}}"}}
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: {{"{{"}} include "{{.chart_name}}.fullname" . {{"}}"}}
        labels:
          {{"{{"}}- include "{{.chart_name}}.labels" . | nindent 4 {{"}}"}}
        {{"{{"}}- with .Values.ingress.annotations {{"}}"}}
        annotations:
          {{"{{"}}- toYaml . | nindent 4 {{"}}"}}
        {{"{{"}}- end {{"}}"}}
      spec:
        {{"{{"}}- if .Values.ingress.className {{"}}"}}
        ingressClassName: {{"{{"}} .Values.ingress.className {{"}}"}}
        {{"{{"}}- end {{"}}"}}
        {{"{{"}}- if .Values.ingress.tls {{"}}"}}
        tls:
          {{"{{"}}- range .Values.ingress.tls {{"}}"}}
          - hosts:
              {{"{{"}}- range .hosts {{"}}"}}
              - {{"{{"}} . | quote {{"}}"}}
              {{"{{"}}- end {{"}}"}}
            secretName: {{"{{"}} .secretName {{"}}"}}
          {{"{{"}}- end {{"}}"}}
        {{"{{"}}- end {{"}}"}}
        rules:
          {{"{{"}}- range .Values.ingress.hosts {{"}}"}}
          - host: {{"{{"}} .host | quote {{"}}"}}
            http:
              paths:
                {{"{{"}}- range .paths {{"}}"}}
                - path: {{"{{"}} .path {{"}}"}}
                  pathType: {{"{{"}} .pathType {{"}}"}}
                  backend:
                    service:
                      name: {{"{{"}} include "{{.chart_name}}.fullname" $ {{"}}"}}
                      port:
                        number: {{"{{"}} $.Values.service.port {{"}}"}}
                {{"{{"}}- end {{"}}"}}
          {{"{{"}}- end {{"}}"}}
      {{"{{"}}- end {{"}}"}}
  - path: "deploy/helm/{{.chart_name}}/templates/_helpers.tpl"
    content: |
      {{"{{"}}/*
      Expand the name of the chart.
      */{{"}}"}}
      {{"{{"}}- define "{{.chart_name}}.name" -{{"}}"}}
      {{"{{"}}- default .Chart.Name .Values.nameOverride | trunc 63 | trimSuffix "-" {{"}}"}}
      {{"{{"}}- end {{"}}"}}

      {{"{{"}}/*
      Create a default fully qualified app name.
      */{{"}}"}}
      {{"{{"}}- define "{{.chart_name}}.fullname" -{{"}}"}}
      {{"{{"}}- if .Values.fullnameOverride {{"}}"}}
      {{"{{"}}- .Values.fullnameOverride | trunc 63 | trimSuffix "-" {{"}}"}}
      {{"{{"}}- else {{"}}"}}
      {{"{{"}}- $name := default .Chart.Name .Values.nameOverride {{"}}"}}
      {{"{{"}}- if contains $name .Release.Name {{"}}"}}
      {{"{{"}}- .Release.Name | trunc 63 | trimSuffix "-" {{"}}"}}
      {{"{{"}}- else {{"}}"}}
      {{"{{"}}- printf "%s-%s" .Release.Name $name | trunc 63 | trimSuffix "-" {{"}}"}}
      {{"{{"}}- end {{"}}"}}
      {{"{{"}}- end {{"}}"}}
      {{"{{"}}- end {{"}}"}}

      {{"{{"}}/*
      Create chart name and version as used by the chart label.
      */{{"}}"}}
      {{"{{"}}- define "{{.chart_name}}.chart" -{{"}}"}}
      {{"{{"}}- printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" {{"}}"}}
      {{"{{"}}- end {{"}}"}}

      {{"{{"}}/*
      Common labels
      */{{"}}"}}
      {{"{{"}}- define "{{.chart_name}}.labels" -{{"}}"}}
      helm.sh/chart: {{"{{"}} include "{{.chart_name}}.chart" . {{"}}"}}
      {{"{{"}} include "{{.chart_name}}.selectorLabels" . {{"}}"}}
      {{"{{"}}- if .Chart.AppVersion {{"}}"}}
      app.kubernetes.io/version: {{"{{"}} .Chart.AppVersion | quote {{"}}"}}
      {{"{{"}}- end {{"}}"}}
      app.kubernetes.io/managed-by: {{"{{"}} .Release.Service {{"}}"}}
      {{"{{"}}- end {{"}}"}}

      {{"{{"}}/*
      Selector labels
      */{{"}}"}}
      {{"{{"}}- define "{{.chart_name}}.selectorLabels" -{{"}}"}}
      app.kubernetes.io/name: {{"{{"}} include "{{.chart_name}}.name" . {{"}}"}}
      app.kubernetes.io/instance: {{"{{"}} .Release.Name {{"}}"}}
      {{"{{"}}- end {{"}}"}}

      {{"{{"}}/*
      Create the name of the service account to use
      */{{"}}"}}
      {{"{{"}}- define "{{.chart_name}}.serviceAccountName" -{{"}}"}}
      {{"{{"}}- if .Values.serviceAccount.create {{"}}"}}
      {{"{{"}}- default (include "{{.chart_name}}.fullname" .) .Values.serviceAccount.name {{"}}"}}
      {{"{{"}}- else {{"}}"}}
      {{"{{"}}- default "default" .Values.serviceAccount.name {{"}}"}}
      {{"{{"}}- end {{"}}"}}
      {{"{{"}}- end {{"}}"}}
  - path: "deploy/helm/{{.chart_name}}/templates/NOTES.txt"
    content: |
      1. Get the application URL by running these commands:
      {{"{{"}}- if .Values.ingress.enabled {{"}}"}}
      {{"{{"}}- range $host := .Values.ingress.hosts {{"}}"}}
        {{"{{"}}- range .paths {{"}}"}}
        http{{"{{"}} if $.Values.ingress.tls {{"}}"}}s{{"{{"}} end {{"}}"}}://{{"{{"}} $host.host {{"}}"}}{{"{{"}} .path {{"}}"}}
        {{"{{"}}- end {{"}}"}}
      {{"{{"}}- end {{"}}"}}
      {{"{{"}}- else if contains "NodePort" .Values.service.type {{"}}"}}
        export NODE_PORT=$(kubectl get --namespace {{"{{"}} .Release.Namespace {{"}}"}} -o jsonpath="{.spec.ports[0].nodePort}" services {{"{{"}} include "{{.chart_name}}.fullname" . {{"}}"}})
        export NODE_IP=$(kubectl get nodes --namespace {{"{{"}} .Release.Namespace {{"}}"}} -o jsonpath="{.items[0].status.addresses[0].address}")
        echo http://$NODE_IP:$NODE_PORT
      {{"{{"}}- else if contains "LoadBalancer" .Values.service.type {{"}}"}}
           NOTE: It may take a few minutes for the LoadBalancer IP to be available.
                 You can watch the status by running 'kubectl get --namespace {{"{{"}} .Release.Namespace {{"}}"}} svc -w {{"{{"}} include "{{.chart_name}}.fullname" . {{"}}"}}'
        export SERVICE_IP=$(kubectl get svc --namespace {{"{{"}} .Release.Namespace {{"}}"}} {{"{{"}} include "{{.chart_name}}.fullname" . {{"}}"}} --template "{{"{{"}}range (index .status.loadBalancer.ingress 0){{"}}"}}{{"{{"}}. {{"}}"}}{{"{{"}}end{{"}}"}}")
        echo http://$SERVICE_IP:{{"{{"}} .Values.service.port {{"}}"}}
      {{"{{"}}- else if contains "ClusterIP" .Values.service.type {{"}}"}}
        export POD_NAME=$(kubectl get pods --namespace {{"{{"}} .Release.Namespace {{"}}"}} -l "app.kubernetes.io/name={{"{{"}} include "{{.chart_name}}.name" . {{"}}"}},app.kubernetes.io/instance={{"{{"}} .Release.Name {{"}}"}}" -o jsonpath="{.items[0].metadata.name}")
        export CONTAINER_PORT=$(kubectl get pod --namespace {{"{{"}} .Release.Namespace {{"}}"}} $POD_NAME -o jsonpath="{.spec.containers[0].ports[0].containerPort}")
        echo "Visit http://127.0.0.1:8080 to use your application"
        kubectl --namespace {{"{{"}} .Release.Namespace {{"}}"}} port-forward $POD_NAME 8080:$CONTAINER_PORT
      {{"{{"}}- end {{"}}"}}
  - path: "deploy/helm/{{.chart_name}}/templates/tests/test-connection.yaml"
    content: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: "{{"{{"}} include "{{.chart_name}}.fullname" . {{"}}"}}-test-connection"
        labels:
          {{"{{"}}- include "{{.chart_name}}.labels" . | nindent 4 {{"}}"}}
        annotations:
          "helm.sh/hook": test
      spec:
        containers:
          - name: wget
            image: busybox
            command: ['wget']
            args: ['{{"{{"}} include "{{.chart_name}}.fullname" . {{"}}"}}:{{"{{"}} .Values.service.port {{"}}"}}']
        restartPolicy: Never
  - path: "deploy/helm/{{.chart_name}}/charts/"
  - path: "deploy/helm/{{.chart_name}}/tests/"
  - path: "deploy/helm/{{.chart_name}}/tests/deployment_test.yaml"
    content: |
      suite: test deployment
      templates:
        - templates/deployment.yaml
      tests:
        - it: should create a Deployment
          asserts:
            - isKind:
                of: Deployment
        - it: should use the correct image
          set:
            image:
              repository: my-app
              tag: "1.0.0"
          asserts:
            - equal:
                path: spec.template.spec.containers[0].image
                value: "my-app:1.0.0"
        - it: should set the correct replica count
          set:
            replicaCount: 3
          asserts:
            - equal:
                path: spec.replicas
                value: 3
        - it: should not set replicas when autoscaling is enabled
          set:
            autoscaling:
              enabled: true
          asserts:
            - notExists:
                path: spec.replicas
  - path: "deploy/helm/{{.chart_name}}/tests/service_test.yaml"
    content: |
      suite: test service
      templates:
        - templates/service.yaml
      tests:
        - it: should create a Service
          asserts:
            - isKind:
                of: Service
        - it: should use ClusterIP by default
          asserts:
            - equal:
                path: spec.type
                value: ClusterIP
        - it: should use the configured port
          set:
            service:
              port: 8080
              type: ClusterIP
          asserts:
            - equal:
                path: spec.ports[0].port
                value: 8080

gitignore: |
  # Helm
  *.tgz
  charts/*.tgz

devcontainer:
  features: {}
  extensions:
    - "ms-kubernetes-tools.vscode-kubernetes-tools"
  setup: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    helm plugin install https://github.com/helm-unittest/helm-unittest

ci:
  job_name: "helm"
  setup_steps:
    - name: "Set up Helm"
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm plugin install https://github.com/helm-unittest/helm-unittest
  lint_steps:
    - name: "Lint chart"
      run: "helm lint deploy/helm/{{.chart_name}}"
  test_steps:
    - name: "Unit test chart"
      run: "helm unittest deploy/helm/{{.chart_name}}"
