name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.2
      - name: markdownlint
        run: npx markdownlint-cli2 '**/*.md' '#design-docs'
      - name: cspell
        run: npx cspell '**/*' --no-progress

  tests:
    runs-on: ubuntu-latest
    needs: [linting]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Unit tests
        run: go test ./internal/... -v
      - name: Acceptance tests
        run: go test ./tests/acceptance/ -v
